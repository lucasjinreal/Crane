[package]
name = "crane"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.97"
clap = {version = "4.5.32", features = ["derive"]}
colored = "3.0.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"
thiserror = "2.0"

crane-core = { path = "../crane-core" }
crane-serve = { path = "../crane-serve" }
ribo = "0.1.3"
tokenizers = { workspace = true }

[features]
onnx = ["crane-core/onnx"]
cuda = ["crane-core/cuda", "crane-serve/cuda"]
cudnn = ["crane-core/cudnn", "crane-serve/cudnn"]
mkl = ["crane-core/mkl", "crane-serve/mkl"]

[lib]
name = "crane"
path = "src/lib.rs"
